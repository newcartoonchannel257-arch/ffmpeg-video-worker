services:
  - type: web
    name: ffmpeg-video-worker
    runtime: python
    buildCommand: "apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
